<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nickname Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #f5f6fb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.5rem;
      margin: 0;
      color: #1a1a2e;
    }

    .container {
      max-width: 820px;
      width: 100%;
      background: #ffffff;
      border-radius: 2.8rem;
      box-shadow: 0 30px 55px -18px rgba(0, 0, 0, 0.07), 0 10px 20px -10px rgba(0, 0, 0, 0.03);
      padding: 2.5rem 2.5rem 2.2rem;
      border: 1px solid #edf0f8;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 620;
      letter-spacing: -0.3px;
      color: #12121c;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .lang-selector {
      position: relative;
    }

    .lang-btn {
      background: #f9fafd;
      border: 1px solid #d9dcec;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: 0.2s;
      color: #1a1a2e;
      white-space: nowrap;
    }

    .lang-btn:hover {
      background: #eef0f8;
      border-color: #b3b8dd;
    }

    .lang-dropdown {
      position: absolute;
      top: 110%;
      right: 0;
      background: white;
      border: 1px solid #e4e7f3;
      border-radius: 1.2rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      padding: 0.5rem;
      display: none;
      z-index: 10;
      min-width: 180px;
    }

    .lang-dropdown.show {
      display: block;
    }

    .lang-option {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      border-radius: 0.8rem;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.15s;
      color: #1a1a2e;
    }

    .lang-option:hover {
      background: #f0f2fc;
    }

    .lang-option.active {
      background: #e0e4f8;
      font-weight: 600;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #4e4e66;
      margin-bottom: 2rem;
      line-height: 1.6;
      background: #fafbfe;
      padding: 0.9rem 1.3rem;
      border-radius: 1.2rem;
      border: 1px solid #edf0f9;
    }

    .controls-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: flex-end;
      background: #f9fafd;
      border-radius: 2rem;
      padding: 1.2rem 1.8rem;
      border: 1px solid #eef1f9;
    }

    .length-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .label-text {
      font-weight: 540;
      color: #2d2d40;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .input-number {
      width: 60px;
      padding: 0.55rem 0.4rem;
      border: 1px solid #d9dcec;
      border-radius: 0.9rem;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 500;
      background: white;
      outline: none;
      transition: 0.2s;
    }

    .input-number:focus {
      border-color: #8b8fb0;
      box-shadow: 0 0 0 3px rgba(100,100,150,0.1);
    }

    .toggle-symbols {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-left: auto;
      background: white;
      padding: 0.4rem 0.9rem;
      border-radius: 2rem;
      border: 1px solid #e2e5f2;
    }

    .toggle-symbols label {
      font-size: 0.9rem;
      font-weight: 500;
      color: #2d2d40;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: pointer;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #cfd4e6;
      transition: 0.25s;
      border-radius: 34px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: 0.25s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #2d2d48;
    }

    input:checked + .slider:before {
      transform: translateX(20px);
    }

    .generate-btn {
      background: #1c1c32;
      border: none;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.75rem 2.2rem;
      border-radius: 2.5rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      white-space: nowrap;
      margin-top: 0.2rem;
      background: #202038;
      box-shadow: 0 8px 16px -6px rgba(0,0,0,0.08);
    }

    .generate-btn:hover {
      background: #2f2f4c;
      transform: translateY(-1px);
    }

    .nickname-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.9rem;
      margin: 1.4rem 0 1rem;
      min-height: 65px;
    }

    .nickname-item {
      background: #ffffff;
      border: 1px solid #e4e7f3;
      padding: 0.7rem 1.7rem;
      border-radius: 3rem;
      font-size: 1.05rem;
      font-weight: 510;
      color: #18182b;
      transition: 0.2s;
      cursor: pointer;
      animation: fadeSlide 0.25s ease;
      background: #fcfdff;
    }

    .nickname-item:hover {
      background: #f0f2fc;
      border-color: #babfe0;
      transform: translateY(-2px);
    }

    @keyframes fadeSlide {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .copy-hint {
      text-align: right;
      font-size: 0.8rem;
      color: #6d6d88;
      margin-top: 0.2rem;
    }

    @media (max-width: 650px) {
      .container {
        padding: 2rem 1.5rem;
      }
      .controls-grid {
        flex-direction: column;
        align-items: flex-start;
      }
      .toggle-symbols {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top-bar">

      <div class="lang-selector" id="langSelector">

      function renderDropdown() {

            if (currentLang === key) {
              langDropdown.classList.remove('show');
              return;
            }
            currentLang = key;
            updateInterface();
            renderDropdown();
            langDropdown.classList.remove('show');
            handleGenerate();
          });
          langDropdown.appendChild(div);
        }
      }

      function generateSingleNick(minLen, maxLen, useSymbols) {
        const data = languages[currentLang];
        const syllables = data.syllables;
        const endings = data.endings;
        const symbols = data.symbols || [];
        let targetLength = Math.floor(Math.random() * (maxLen - minLen + 1)) + minLen;
        targetLength = Math.max(2, targetLength);
        let nick = syllables[Math.floor(Math.random() * syllables.length)];
        while (nick.length < targetLength) {
          const remaining = targetLength - nick.length;
          if (remaining <= 2 && Math.random() > 0.3 && endings.length) {
            const short = endings.filter(e => e.length <= remaining);
            nick += short.length ? short[Math.floor(Math.random() * short.length)] : syllables[Math.floor(Math.random() * syllables.length)].substring(0, remaining);
          } else {
            const next = syllables[Math.floor(Math.random() * syllables.length)];
            if (nick.length + next.length > targetLength) {
              const slice = targetLength - nick.length;
              if (slice > 0) nick += next.substring(0, slice);
            } else nick += next;
          }
        }
        nick = nick.substring(0, targetLength);
        nick = nick.charAt(0).toUpperCase() + nick.slice(1).toLowerCase();
        if (useSymbols && symbols.length && Math.random() < 0.45) {
          const sym = symbols[Math.floor(Math.random() * symbols.length)];
          if (Math.random() > 0.5) nick += sym;
          else if (nick.length > 2) {
            const pos = Math.floor(Math.random() * (nick.length - 1)) + 1;
            nick = nick.slice(0, pos) + sym + nick.slice(pos);
          }
        }
        return nick;
      }

        const useSymbols = symbolsToggle.checked;
        const validMin = Math.max(2, Math.min(minLen, 15));
        const validMax = Math.max(validMin, Math.min(maxLen, 18));
        if (minLen !== validMin) minLengthInput.value = validMin;
        if (maxLen !== validMax) maxLengthInput.value = validMax;
        const set = new Set();
        for (let i = 0; i < count * 2 && set.size < count; i++) {
          const nick = generateSingleNick(validMin, validMax, useSymbols);
          if (nick && nick.length >= validMin) set.add(nick);
        }
        return Array.from(set).slice(0, count);
      }

      function renderList(nicks) {
        nicknameListDiv.innerHTML = '';
        if (!nicks.length) {
          nicknameListDiv.innerHTML = '<div style="color:#8c8ca0; padding:0.5rem;">—</div>';
          return;
        }
        nicks.forEach(nick => {
          const span = document.createElement('span');
          span.className = 'nickname-item';
          span.textContent = nick;
          span.addEventListener('click', () => copyToClipboard(nick));
          nicknameListDiv.appendChild(span);
        });
      }

      function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          copyHint.textContent = '✅ ' + text;
          copyHint.style.color = '#2e7d32';
          setTimeout(() => {
            copyHint.textContent = languages[currentLang].copyHint;
            copyHint.style.color = '#6d6d88';
          }, 1500);
        }).catch(() => alert('Failed to copy: ' + text));
      }

      function handleGenerate() {
        renderList(generateNicknames(GENERATE_COUNT));
      }

      function init() {
        updateInterface();
        renderDropdown();
        handleGenerate();

        generateBtn.addEventListener('click', handleGenerate);
        symbolsToggle.addEventListener('change', handleGenerate);
        [minLengthInput, maxLengthInput].forEach(inp => {
          inp.addEventListener('keypress', e => { if (e.key === 'Enter') handleGenerate(); });
          inp.addEventListener('change', handleGenerate);
        });
      }

      init();
    })();
  </script>
</body>
</html>
